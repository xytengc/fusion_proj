# UDP验证程序配置文件
# 支持的程序:
#   - udp_verifier.py (标准版)
#   - udp_verifier_advanced.py (高级版)

[network]
# UDP接收端口
udp_port = 32896

# 接收缓冲区大小 (字节)
# 增大此值可以减少丢包
recv_buffer_size = 4194304  # 4MB

# UDP包大小
packet_size = 1453

[image]
# 图像分辨率
width = 640
height = 480
channels = 3

# 图像子包数量
image_packets = 640

# 每包数据大小
data_size = 1440

[radar]
# 雷达数据参考文件路径
reference_txt = cycle/_AKBK0.txt

# 最大目标数
max_targets = 64

# 目标结构大小 (字节)
target_size = 16

# 参数误差阈值
# 用于判断接收数据与参考数据是否匹配
distance_error_threshold = 0.5    # 米
velocity_error_threshold = 0.5    # m/s
angle_error_threshold = 0.5       # 度
power_error_threshold = 5.0       # dBm

[video]
# 参考视频文件路径
reference_video = cycle/video10.mp4

# 加载的最大帧数
max_video_frames = 300

# 图像相似度阈值 (%)
# 标准版使用MSE, 高级版使用百分比
image_similarity_threshold = 85    # %

[cpu]
# CPU核心绑定配置
# -1: 自动选择, 0-3: 指定核心ID
# 典型配置:
#   1: 小核1
#   2: 小核2
#   {1, 2}: 多核绑定 (使用JSON格式)
cpu_core = 1

# CPU关亲和性启用
enable_cpu_affinity = true

[logging]
# 日志级别 (DEBUG, INFO, WARNING, ERROR)
log_level = INFO

# 日志输出可选值:
#   console: 终端输出
#   file: 文件输出
#   both: 同时输出 (默认)
log_output = both

# 统计信息输出间隔 (秒)
stats_interval = 1.0

# 详细验证日志输出间隔 (秒)
detail_interval = 5.0

[performance]
# 帧缓存最大数量
# 超过此数会清理最旧帧
max_frame_cache = 15

# 实时窗口大小 (用于高级版)
# 计算最近N个包的速率
window_size = 100

# 丢包检测启用
enable_loss_detection = true

[verification]
# 验证模式
# strict: 严格匹配
# loose: 松散匹配 (允许更大误差)
verification_mode = strict

# RGB通道校正启用
enable_channel_correction = true

# 图像边界检查启用
enable_boundary_check = true

[advanced_mode_only]
# 以下配置仅在 udp_verifier_advanced.py 中使用

# 滑动窗口延迟样本数
latency_sample_count = 100

# 详细算法设置
enable_similarity_score = true
similarity_formula = exponential  # linear, exponential, sigmoid

# 准确率报告粒度
report_granularity = frame  # frame, second

# 实时数据可视化
enable_visualization = true

# 可视化窗口更新间隔 (秒)
viz_update_interval = 0.5
